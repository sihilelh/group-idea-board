<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScholarKit - GPA Calculator</title>
    <link rel="icon" type="image/svg+xml" href="assets/icons/cart-icon.svg">
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-content">
        <div class="header-left">
          <button id="sidebarToggle" class="sidebar-toggle" aria-label="Open sidebar" aria-expanded="false" title="Toggle sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <h1 class="header-title"><img src="assets/icons/cart-icon.svg" alt="Cart" class="logo-icon" style="width: 28px; height: 28px; vertical-align: middle; margin-right: 8px;"> ScholarKit</h1>
          <p style="color: #ffffff; font-size: 14px">Tools for Students</p>
        </div>
        <button id="themeToggle" class="theme-toggle" onclick="ThemeManager.toggleTheme()" title="Toggle theme">
          <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </header>

    <div class="app-layout">
      <aside class="sidebar" aria-label="ScholarKit tools">
        <div class="sidebar-header">
          <h2 class="sidebar-title">ScholarKit</h2>
        </div>
        <nav class="sidebar-nav">
          <a class="sidebar-item" href="index.html">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"></circle>
              <circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span>IdeaKart</span>
          </a>
          <a class="sidebar-item active" href="gpa-calculator.html" aria-current="page">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"></path>
            </svg>
            <span>GPA Calculator</span>
          </a>
          <a class="sidebar-item" href="pomodoro-timer.html">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>Pomodoro Timer</span>
          </a>
          <a class="sidebar-item" href="my-schedule.html">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>My Schedule</span>
          </a>
        </nav>
      </aside>

      <div class="sidebar-backdrop" aria-hidden="true"></div>

      <main class="main-content">
        <div class="container">
          <div class="form-container">
            <h2>GPA Calculator</h2>
            
            <div class="gpa-input-row">
              <div class="form-group gpa-input-group">
                <label class="form-label">Credits</label>
                <input type="number" id="credits" class="form-input" placeholder="e.g. 3">
              </div>
              <div class="form-group gpa-input-group">
                <label class="form-label">Grade</label>
                <input type="text" id="grade" class="form-input" placeholder="e.g. A+">
              </div>
              <button class="btn btn-primary gpa-btn-add" onclick="addCourse()" title="Add Course">+</button>
            </div>

            <div id="errorDisplay" class="gpa-error-container"></div>

            <table id="courseTable" class="gpa-course-table" style="display: none;">
              <thead>
                <tr>
                  <th>Course Number</th>
                  <th>Credits</th>
                  <th>Grade</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>

            <div class="gpa-footer-row">
              <button class="btn btn-primary" onclick="calculateFinalGPA()">Calculate</button>
            </div>

            <div id="finalResult" class="gpa-result"></div>
          </div>
        </div>
      </main>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <p>&copy; 2026 ScholarKit. All rights reserved. | Created By: Group 09</p>
      </div>
    </footer>

    <script src="assets/js/ui-utils.js"></script>
    <script src="assets/js/theme-manager.js"></script>

    <script>
      function toggleSidebar() {
        document.body.classList.toggle('sidebar-open');
        const toggleBtn = document.getElementById('sidebarToggle');
        const isOpen = document.body.classList.contains('sidebar-open');
        toggleBtn.setAttribute('aria-label', isOpen ? 'Close sidebar' : 'Open sidebar');
        toggleBtn.setAttribute('aria-expanded', isOpen);
      }

      function closeSidebar() {
        document.body.classList.remove('sidebar-open');
        const toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.setAttribute('aria-label', 'Open sidebar');
        toggleBtn.setAttribute('aria-expanded', 'false');
      }

      // GPA Calculator functionality
      let courses = [];
      const gradeScale = {
        'A+': 4.0, 'A': 4.0, 'A-': 3.7, 'B+': 3.3, 'B': 3.0, 'B-': 2.7,
        'C+': 2.3, 'C': 2.0, 'C-': 1.7, 'D+': 1.3, 'D': 1.0, 'D-': 0.7, 'E': 0.0
      };

      function addCourse() {
        const creditInput = document.getElementById('credits');
        const gradeInput = document.getElementById('grade');
        const errorDisplay = document.getElementById('errorDisplay');
        
        let errors = [];
        const credits = parseInt(creditInput.value);
        const gradeRaw = gradeInput.value.trim().toUpperCase();

        if (isNaN(credits) || credits <= 0) {
          errors.push("Credits must be an integer > 0.");
        }
        if (!gradeScale.hasOwnProperty(gradeRaw)) {
          errors.push("Grade must be A+, A, A-, B+, B, B-, C+, C, C-, D+, D, D-, or E.");
        }

        if (errors.length > 0) {
          errorDisplay.innerHTML = errors.join("<br>");
          return;
        }

        errorDisplay.innerHTML = "";
        courses.push({ credits, grade: gradeRaw, point: gradeScale[gradeRaw] });
        updateTable();

        creditInput.value = "";
        gradeInput.value = "";
        creditInput.focus();
      }

      function updateTable() {
        const table = document.getElementById('courseTable');
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        
        if (courses.length > 0) table.style.display = "table";

        courses.forEach((course, index) => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${index + 1}</td>
            <td>${course.credits}</td>
            <td class="gpa-grade-cell">
              ${course.grade}
              <button class="btn-icon gpa-delete-btn" onclick="deleteRow(${index})" title="Delete Course">
                <svg class="gpa-bin-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
              </button>
            </td>
          `;
          tbody.appendChild(row);
        });
      }

      function deleteRow(index) {
        courses.splice(index, 1);
        if (courses.length === 0) {
          document.getElementById('courseTable').style.display = "none";
          const resultDiv = document.getElementById('finalResult');
          resultDiv.style.display = "none";
          resultDiv.className = "gpa-result";
        }
        updateTable();
      }

      function calculateFinalGPA() {
        const resultDiv = document.getElementById('finalResult');
        if (courses.length === 0) {
          resultDiv.style.display = "block";
          resultDiv.innerHTML = "Add courses first!";
          resultDiv.className = "gpa-result gpa-result-error";
          return;
        }

        let totalPoints = 0;
        let totalCredits = 0;
        courses.forEach(c => {
          totalPoints += (c.point * c.credits);
          totalCredits += c.credits;
        });

        const gpa = totalPoints / totalCredits;
        resultDiv.style.display = "block";
        resultDiv.innerHTML = `Overall GPA: ${gpa.toFixed(2)}`;
        resultDiv.className = "gpa-result gpa-result-success";
      }

      document.addEventListener('DOMContentLoaded', () => {
        ThemeManager.init();

        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebarBackdrop = document.querySelector('.sidebar-backdrop');
        const sidebarItems = document.querySelectorAll('.sidebar-item');

        if (sidebarToggle) {
          sidebarToggle.addEventListener('click', toggleSidebar);
        }

        if (sidebarBackdrop) {
          sidebarBackdrop.addEventListener('click', closeSidebar);
        }

        sidebarItems.forEach(item => {
          item.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
              closeSidebar();
            }
          });
        });

        // Add Enter key support for GPA calculator inputs
        const creditInput = document.getElementById('credits');
        const gradeInput = document.getElementById('grade');
        if (creditInput && gradeInput) {
          [creditInput, gradeInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
              if (e.key === 'Enter') addCourse();
            });
          });
        }
      });
    </script>
  </body>
</html>
