<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Group Idea Board</title>

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/styles.css" />

    <!-- Quill Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />
  </head>
  <body>
    <!-- WHO ARE YOU MODAL -->
    <div id="userSelectModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Who are you?</h2>
          <p>Select your name from the list or add yourself as a new team member</p>
        </div>
        <div class="modal-body">
          <select id="modalUserSelect" class="form-select" style="width: 100%; padding: 12px; margin-bottom: 16px;"></select>
        </div>
        <div class="modal-footer">
          <button class="btn-primary" onclick="IdeaBoardManager.selectUserFromModal()">Continue</button>
          <button class="btn-secondary" onclick="IdeaBoardManager.goToAddTeamMember()">Add Team Member</button>
        </div>
      </div>
    </div>

    <!-- HEADER -->
    <header class="header">
      <div class="header-content">
        <h1 class="header-title"><img src="assets/icons/brain-icon.svg" alt="Brain" style="width: 28px; height: 28px; vertical-align: middle; margin-right: 8px;"> Group Idea Board</h1>
        <p style="color: #ffffff; font-size: 14px">Collaborate and Share Ideas</p>
      </div>
    </header>

    <!-- MAIN CONTAINER -->
    <div class="container">
      <!-- TABS -->
      <div class="tabs">
        <button class="tab-button active" onclick="switchTab('board')"><img src="assets/icons/clipboard-icon.svg" alt="Board" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 6px;"> Idea Board</button>
        <button class="tab-button" onclick="switchTab('team')"><img src="assets/icons/people-icon.svg" alt="Team" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 6px;"> Team Members</button>
      </div>

      <!-- IDEA BOARD TAB -->
      <div id="boardContainer" class="tab-content">
        <!-- Add Idea Form -->
        <div class="form-container">
          <h2>Add Your Idea</h2>

          <form id="ideaForm">
            <div class="form-group">
              <label class="form-label" for="ideaAuthor">Who are you? <span class="required">*</span></label>
              <select id="ideaAuthor" class="form-select" required></select>
            </div>

            <div class="form-group">
              <label class="form-label" for="ideaContent">Your Idea <span class="required">*</span></label>
              <div id="ideaContent"></div>
            </div>

            <button type="submit" class="btn btn-primary">
              <img src="assets/icons/star-icon.svg" alt="Add" style="width: 16px; height: 16px; vertical-align: middle;">
              <span>Add Idea</span>
            </button>
          </form>
        </div>

        <!-- Sort Controls -->
        <div id="sortControls" class="sort-controls mt-24">
          <label for="sortSelect">
            Sort by:
            <select id="sortSelect">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
              <option value="author">Author A-Z</option>
            </select>
          </label>
        </div>

        <!-- Filter Controls -->
        <div id="filterControls" class="filter-controls">
          <label for="filterSelect">
            Filter by User:
            <select id="filterSelect">
              <option value="">All Users</option>
            </select>
          </label>
          <button onclick="IdeaBoardManager.resetFilter()" type="button">Reset Filter</button>
        </div>

        <!-- Ideas List -->
        <div id="ideasContainer" class="ideas-list"></div>

        <!-- Pagination -->
        <div id="paginationContainer"></div>
      </div>

      <!-- TEAM MEMBERS TAB -->
      <div id="teamContainer" class="tab-content hidden">
        <!-- Add Team Member Form -->
        <div class="form-container">
          <h2>Add Team Member</h2>

          <form id="teamMemberForm">
            <div class="form-group">
              <label class="form-label" for="teamMemberInput">Team Member Name <span class="required">*</span></label>
              <input
                type="text"
                id="teamMemberInput"
                class="form-input"
                placeholder="Enter team member name"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary">
              <img src="assets/icons/plus-icon.svg" alt="Add" style="width: 16px; height: 16px; vertical-align: middle;">
              <span>Add Member</span>
            </button>
          </form>
        </div>

        <!-- Team Members List -->
        <div id="teamMembersContainer">
          <div id="teamMembersList" class="ideas-list mt-24"></div>
        </div>
      </div>
    </div>

    <!-- SCRIPTS -->
    <!-- Quill Editor -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <!-- Utilities -->
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/ui-utils.js"></script>

    <!-- Feature Modules -->
    <script src="assets/js/team-members.js"></script>
    <script src="assets/js/idea-board.js"></script>

    <!-- App Initialization -->
    <script>
      /**
       * Tab switching functionality
       */
      function switchTab(tabName) {
        // Hide all tabs
        document.querySelectorAll('.tab-content').forEach(tab => {
          tab.classList.add('hidden');
        });

        // Remove active class from all buttons
        document.querySelectorAll('.tab-button').forEach(btn => {
          btn.classList.remove('active');
        });

        // Show selected tab
        if (tabName === 'board') {
          document.getElementById('boardContainer').classList.remove('hidden');
          document.querySelectorAll('.tab-button')[0].classList.add('active');
        } else if (tabName === 'team') {
          document.getElementById('teamContainer').classList.remove('hidden');
          document.querySelectorAll('.tab-button')[1].classList.add('active');
        }
      }

      /**
       * Initialize app when DOM is ready
       */
      document.addEventListener('DOMContentLoaded', () => {
        // Initialize managers
        IdeaBoardManager.init();
        TeamMembersManager.init();

        // Show user selection modal
        IdeaBoardManager.showUserSelectionModal();
      });
    </script>
  </body>
</html>
