<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick GPA Calculator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.2rem; text-align: center; color: #28a745; }
        .error { color: #dc3545; font-size: 0.9rem; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>GPA Calculator 🎓</h2>
    
    <div class="input-group">
        <label for="credits">Course Credits (Integer > 0)</label>
        <input type="number" id="credits" placeholder="e.g. 3" min="1" required>
    </div>

    <div class="input-group">
        <label for="grade">Grade (A+, A, B-, etc.)</label>
        <input type="text" id="grade" placeholder="e.g. A-" required>
    </div>

    <button onclick="calculateGPA()">Calculate GPA</button>

    <div id="result"></div>
</div>

<script>
    function calculateGPA() {
        const creditInput = document.getElementById('credits').value;
        const gradeInput = document.getElementById('grade').value.toUpperCase().trim();
        const resultDiv = document.getElementById('result');
        
        // Grade Scale Mapping
        const gradeScale = {
            'A+': 4.0, 'A': 4.0, 'A-': 3.7,
            'B+': 3.3, 'B': 3.0, 'B-': 2.7,
            'C+': 2.3, 'C': 2.0, 'C-': 1.7,
            'D+': 1.3, 'D': 1.0, 'D-': 0.7,
            'E': 0.0
        };

        const credits = parseInt(creditInput);

        // Validation
        if (isNaN(credits) || credits <= 0) {
            resultDiv.innerHTML = '<span class="error">Please enter a valid credit integer > 0.</span>';
            return;
        }

        if (!gradeScale.hasOwnProperty(gradeInput)) {
            resultDiv.innerHTML = '<span class="error">Invalid grade. Use A+, A, A-, B+, etc.</span>';
            return;
        }

        // Calculation
        const gpa = gradeScale[gradeInput];
        resultDiv.innerHTML = `Your GPA for this course is: ${gpa.toFixed(2)}`;
    }
</script>

</body>
</html>
